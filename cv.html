<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sergei L Kosakovsky Pond, PhD - Curriculum Vitae</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    
    <style>
        body {
            font-family: "Tahoma", "Arial", sans-serif;
            font-size: 0.9rem;
            color: #333;
            line-height: 1.5;
        }
        h1 {
            font-weight: 700;
            color: #2c3e50;
        }
        h4 {
            border-bottom: 2px solid #eee;
            padding-bottom: 0.5rem;
            margin-top: 1.5rem;
            margin-bottom: 1rem;
            color: #2c3e50;
            text-transform: uppercase;
            font-size: 1.1rem;
            font-weight: 600;
        }
        .table td {
            vertical-align: top;
            border-top: none !important;
        }
        .img-profile {
            max-height: 120px;
            width: auto;
            border: 3px solid #eee;
        }
        .badge {
            font-weight: 500;
        }
        @media print {
            .d-print-none {
                display: none !important;
            }
            .d-print-inline {
                display: inline !important;
            }
            body {
                font-size: 10pt;
            }
            h4 {
                border-bottom: 1px solid #ccc;
            }
        }
    </style>
</head>
<body class="bg-light">
    <div class="container bg-white shadow-sm my-4 p-4 p-md-5">
        <header class="row mb-4 align-items-center">
            <div class="col-md-auto text-center text-md-start mb-3 mb-md-0">
                <img src="slkp.jpg" alt="Sergei L Kosakovsky Pond" class="img-fluid rounded img-profile">
            </div>
            <div class="col-md text-center text-md-start">
                <h1 class="mb-0">Sergei L Kosakovsky Pond</h1>
                <p class="lead text-muted mb-0">Curriculum Vitae</p>
            </div>
        </header>

        <section class="row mb-4">
            <div class="col-md-4" data-receiver-for="Research Interests" data-style-type="list" data-style-header="on"></div>
            <div class="col-md-4" data-receiver-for="Contact Information" data-style-type="contact" data-style-header="on"></div>
            <div class="col-md-4" data-receiver-for="Links" data-style-type="list" data-style-header="on"></div>
        </section>

        <section class="row mb-4">
            <div class="col-md-6" data-receiver-for="Positions Held" data-style-type="table" data-style-header="on"></div>
            <div class="col-md-6" data-receiver-for="Education" data-style-type="table" data-style-header="on"></div>
        </section>

        <section class="row mb-4">
            <div class="col-md-6" data-receiver-for="Awards and Honors" data-style-type="table" data-style-header="on"></div>
            <div class="col-md-6" data-receiver-for="Professional Activities" data-style-type="table" data-style-header="on"></div>
        </section>

        <section class="row mb-4">
            <div class="col-12" data-receiver-for="Grants and Fellowships" data-style-type="table" data-style-header="on"></div>
        </section>

        <section class="row mb-4">
            <div class="col-12" data-receiver-for="Publications" data-style-type="bibtex" data-style-header="on"></div>
        </section>

        <section class="row mb-4">
            <div class="col-12" data-receiver-for="Software Projects" data-style-type="table" data-style-header="on"></div>
        </section>

        <section class="row mb-4">
            <div class="col-12" data-receiver-for="Courses Taught" data-style-type="table" data-style-header="on"></div>
        </section>

        <section class="row mb-4">
            <div class="col-12" data-receiver-for="Workshops" data-style-type="table" data-style-header="on"></div>
        </section>

        <section class="row mb-4">
            <div class="col-12" data-receiver-for="Advising and Mentoring" data-style-type="table" data-style-header="on"></div>
        </section>
    </div>

    <!-- Scripts -->
    <script src="parse-bibtex.js"></script>
    <script src="cv.js"></script>
</body>
</html>
